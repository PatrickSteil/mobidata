name: Build

# Runs on every push and pull request so you catch compile errors early
on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install gcc (required for go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Download dependencies
        run: go mod tidy

      - name: Build poller
        run: go build ./cmd/poller

      - name: Build server
        run: go build ./cmd/server
